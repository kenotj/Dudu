<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dudu PDF Viewer</title>
    <style>
      body {
        margin: 0;
        background: #1f2937;
        color: #f9fafb;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #toolbar {
        position: sticky;
        top: 0;
        padding: 8px 12px;
        background: #111827;
        display: flex;
        gap: 8px;
        align-items: center;
        z-index: 10;
      }
      #toolbar input[type='file'] {
        color: #f9fafb;
      }
      #viewer {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        gap: 16px;
      }
      .page {
        position: relative;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .text-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
        opacity: 0.9;
        line-height: 1;
        color: transparent;
      }
      .text-layer span {
        position: absolute;
        white-space: pre;
        transform-origin: 0 0;
      }
      .translation-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .translation-layer span {
        position: absolute;
        color: #111;
        background: rgba(255, 255, 255, 0.85);
        white-space: nowrap;
        transform-origin: 0 0;
        padding: 0 2px;
        font-family: sans-serif;
      }
      .status {
        padding: 8px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <strong>Dudu PDF</strong>
      <input type="file" id="file" accept="application/pdf" />
      <span id="status" class="status">Select a PDF file.</span>
    </div>
    <div id="viewer"></div>
    <script type="module" src="./viewer.ts"></script>
  </body>
</html>
